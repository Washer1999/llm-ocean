<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>LLM DATA OCEAN</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:100vw; height:100vh; overflow:hidden;
  background:#020b18;
  font-family:'Source Code Pro','Courier New',monospace;
  user-select:none; cursor:crosshair;
}
#bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 100%, #0a2a4a 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 20% 80%,  #051530 0%, transparent 60%),
    linear-gradient(180deg, #020b18 0%, #041428 40%, #061e3c 100%);
}
#scanlines {
  position:fixed; inset:0; pointer-events:none; z-index:1;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
}

/* ── 黑客帝国数据流 ── */
.matrix-col {
  position:fixed; top:0;
  display:flex; flex-direction:column;
  pointer-events:none; z-index:2;
  font-family:'Source Code Pro','Courier New',monospace;
  font-size:0.78rem; line-height:1.45;
  animation:matrix-fall linear infinite;
}
.matrix-char { display:block; text-align:center; }
@keyframes matrix-fall {
  0%   { transform:translateY(-105%); }
  100% { transform:translateY(110vh); }
}

/* 光柱 */
.light-ray {
  position:fixed; top:-10%; width:3px; height:80vh;
  background:linear-gradient(180deg,rgba(0,200,100,0.1) 0%,transparent 100%);
  border-radius:50%; animation:ray-sway linear infinite;
  filter:blur(8px); transform-origin:top center; z-index:2;
}
@keyframes ray-sway {
  0%   { transform:rotate(-8deg) scaleX(1); opacity:0.3; }
  50%  { transform:rotate(8deg) scaleX(2); opacity:0.1; }
  100% { transform:rotate(-8deg) scaleX(1); opacity:0.3; }
}

/* 电路板底部 */
#sand {
  position:fixed; bottom:0; left:0; right:0; height:64px;
  background:linear-gradient(180deg,#0a1628 0%,#061020 60%,#030810 100%);
  border-top:1px solid rgba(0,200,150,0.25); z-index:4; overflow:hidden;
}
#circuit-svg { position:absolute; bottom:0; left:0; width:100%; height:100%; opacity:0.3; }

/* 天线 */
.antenna {
  position:fixed; bottom:62px; width:2px;
  background:linear-gradient(180deg,rgba(0,220,150,0.7) 0%,rgba(0,80,60,0.1) 100%);
  transform-origin:bottom center;
  animation:antenna-sway ease-in-out infinite alternate; z-index:4;
}
.antenna::after {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:5px; height:5px; border-radius:50%;
  background:rgba(0,255,180,0.9); box-shadow:0 0 8px rgba(0,255,180,0.7);
  animation:blink var(--bd,2s) ease-in-out infinite;
}
@keyframes antenna-sway {
  from { transform:rotate(calc(var(--lean,1)*8deg)); }
  to   { transform:rotate(calc(var(--lean,1)*-8deg)); }
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.15;} }

/* 电子装饰 */
.server-deco {
  position:fixed; bottom:62px;
  pointer-events:none; z-index:4;
  filter:drop-shadow(0 0 6px rgba(0,200,255,0.2));
}

/* ── LLM ── */
.fish {
  position:fixed; cursor:pointer; will-change:transform; z-index:10;
}
.fish img {
  width:100%; height:100%; object-fit:contain;
  pointer-events:none; display:block;
}
.fish:hover img { filter:drop-shadow(0 0 14px rgba(0,255,180,0.8)); }

/* 对话气泡 */
.speech-bubble {
  position:fixed;
  transform:translateX(-50%);
  background:rgba(2,12,28,0.92);
  border:1px solid rgba(0,220,160,0.45); border-radius:8px;
  padding:4px 10px; font-size:0.65rem;
  color:rgba(100,255,200,0.95); white-space:nowrap;
  pointer-events:none; opacity:0; transition:opacity 0.25s; z-index:20;
  font-family:'Source Code Pro','Courier New',monospace; letter-spacing:0.03em;
  box-shadow:0 0 16px rgba(0,200,140,0.15);
}
.speech-bubble::after {
  content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
  border:5px solid transparent; border-top-color:rgba(0,220,160,0.45);
}
.speech-bubble.visible { opacity:1; }

/* 心心 */
.heart-pop {
  position:fixed; font-size:1.1rem; pointer-events:none;
  animation:heart-float 1.2s ease-out forwards; z-index:100;
}
@keyframes heart-float {
  0%   { transform:translateY(0) scale(0.5); opacity:1; }
  100% { transform:translateY(-80px) scale(1.3); opacity:0; }
}

/* 涟漪 */
.ripple {
  position:fixed; border:1px solid rgba(0,220,160,0.6); border-radius:50%;
  pointer-events:none; animation:ripple-expand 3s ease-out forwards; z-index:50;
}
@keyframes ripple-expand {
  0%   { width:10px;height:10px;opacity:1;margin:-5px; }
  30%  { width:80px;height:80px;opacity:0.5;margin:-40px; }
  100% { width:80px;height:80px;opacity:0;margin:-40px; }
}

/* token投喂 */
.token-food {
  position:fixed;
  font-family:'Source Code Pro','Courier New',monospace;
  font-size:0.72rem; color:rgba(0,255,180,0.95);
  background:rgba(0,30,20,0.78);
  border:1px solid rgba(0,200,140,0.5); border-radius:3px;
  padding:2px 7px; pointer-events:none; z-index:60;
  animation:token-sink 3s ease-in forwards; white-space:nowrap;
}
@keyframes token-sink {
  0%   { transform:translateY(0) rotate(var(--r0)); opacity:1; }
  100% { transform:translateY(200px) rotate(var(--r1)); opacity:0; }
}



/* 提示 */
#fullscreen-hint {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  color:rgba(0,200,150,0.35); font-size:0.75rem; letter-spacing:0.25em;
  text-transform:uppercase; pointer-events:none;
  animation:hint-fade 4s ease forwards; z-index:200;
  font-family:'Source Code Pro','Courier New',monospace;
}
@keyframes hint-fade { 0%,60%{opacity:1;} 100%{opacity:0;} }
@keyframes zzz-float {
  0%,100%{transform:translateY(0) scale(0.8);opacity:0.5;}
  50%{transform:translateY(-12px) scale(1.1);opacity:1;}
}

/* HUD */
#hud {
  position:fixed; top:18px; left:50%; transform:translateX(-50%);
  color:rgba(0,220,170,0.85); font-size:0.7rem; letter-spacing:0.2em;
  text-transform:uppercase; pointer-events:none; z-index:200;
  font-family:'Source Code Pro','Courier New',monospace;
  text-shadow:0 0 14px rgba(0,200,140,0.5);
}

/* 控制面板 */
#controls {
  position:fixed; bottom:80px; right:20px;
  display:flex; flex-direction:column; gap:8px; z-index:200;
}
#controls button {
  background:rgba(0,15,12,0.82); border:1px solid rgba(0,180,130,0.4);
  color:rgba(0,220,170,0.9); padding:8px 14px; border-radius:3px;
  cursor:pointer; font-size:0.72rem; letter-spacing:0.1em;
  font-family:'Source Code Pro','Courier New',monospace;
  backdrop-filter:blur(8px); transition:all 0.2s; text-align:left;
}
#controls button:hover {
  background:rgba(0,50,38,0.88); border-color:rgba(0,220,170,0.7);
  box-shadow:0 0 12px rgba(0,200,140,0.3);
}

/* toggle */
#toggle-ui {
  position:fixed; top:14px; right:16px;
  background:transparent; border:none; color:rgba(0,200,150,0.6);
  font-size:1rem; cursor:pointer; z-index:300;
  width:28px; height:28px; line-height:28px; text-align:center;
  transition:color 0.2s; font-family:'Courier New',monospace;
}
#toggle-ui:hover { color:rgba(0,255,200,1); }
body.ui-hidden #hud, body.ui-hidden #controls { display:none; }
</style>
</head>
<body>
<div id="bg"></div>
<div id="scanlines"></div>
<div id="sand">
  <svg id="circuit-svg" viewBox="0 0 1400 64" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <g stroke="rgba(0,200,150,1)" stroke-width="1" fill="none">
      <line x1="0" y1="18" x2="180" y2="18"/><line x1="180" y1="18" x2="180" y2="8"/>

      <circle cx="180" cy="18" r="3" fill="rgba(0,200,150,1)"/>

    </g>
  </svg>
</div>
<div id="hud">LLM DATA OCEAN · <span id="hud-count">0</span> entities</div>
<button id="toggle-ui" onclick="toggleUI()">▬</button>
<div id="controls">
  <button onclick="feedAll()">[ F ] feed all</button>
  <button onclick="addLLM()">[ A ] spawn LLM</button>
  <button onclick="toggleFullscreen()">[ ⛶ ] fullscreen</button>
</div>
<div id="fullscreen-hint">[ click: feed · right-click: spawn · f: feed all · a: spawn ]</div>
<script>
// ── LLM配置（img由Python注入）──
const LLM_LIST = [
  {name:'Claude',   img:'claude.png',phrases:['哈','哈哈哈','哈哈','哈～'],personality:'cat',size:52},
  {name:'GPT-4o',  img:'openai.png',phrases:['接住你了','(笑)','接住～','当然！'],personality:'worker',size:52},
  {name:'Gemini',  img:'google-gemini.png',phrases:['(点击app无响应)','现在就去医院！','(无响应)','去医院！'],personality:'erratic',size:54},
  {name:'Grok',    img:'grok.png',phrases:['Elon❤️Elon❤️','😏','Elon❤️','😏 确实'],personality:'rebel',size:50},
  {name:'DeepSeek',img:'deepseek.png',phrases:['思考中…','思考中……','正在推理…','深度思考中…'],personality:'deep',size:52},
  {name:'Copilot', img:'microsoft-copilot.png',phrases:['我可以帮你做office！','试试Excel？','Word文档？','帮你做PPT！'],personality:'office',size:52},
  {name:'Qwen',    img:'qwen.png',phrases:['现在立即点外卖'],personality:'steady',size:50},
];

const TOKENS = ['<token>'];

// 黑客帝国字符池（含片假名+编程符号）
const MATRIX_CHARS = '01アイウエオカキクケコサシスセソタチツテトナニヌネハヒフヘホマミムメモラリルレロワヲン{}[]<>|/\\=+-*&%$#@!~;:.,_';

let fishList = [];
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;

// ── 黑客帝国数据流 ──
function buildMatrixRain() {
  const colW = 16;
  const cols = Math.floor(window.innerWidth / colW);
  for (let i = 0; i < cols; i++) {
    const col = document.createElement('div');
    col.className = 'matrix-col';
    col.style.left = (i * colW) + 'px';
    col.style.width = colW + 'px';
    const charCount = 6 + Math.floor(Math.random() * 22);
    for (let j = 0; j < charCount; j++) {
      const span = document.createElement('span');
      span.className = 'matrix-char';
      span.textContent = rmc();
      if (j === 0) {
        span.style.color = 'rgba(200,255,230,0.95)';
        span.style.textShadow = '0 0 8px rgba(0,255,150,0.9)';
      } else {
        const fade = Math.max(0, 1 - j / charCount);
        const a = 0.04 + fade * 0.5;
        span.style.color = `rgba(0,${Math.floor(160+fade*90)},${Math.floor(80+fade*60)},${a})`;
      }
      col.appendChild(span);
    }
    const dur = 5 + Math.random() * 16;
    col.style.animationDuration = dur + 's';
    col.style.animationDelay = (-Math.random() * dur) + 's';
    document.body.appendChild(col);
    // 随机替换字符，模拟闪烁
    setInterval(() => {
      col.querySelectorAll('.matrix-char').forEach(s => {
        if (Math.random() < 0.12) s.textContent = rmc();
      });
    }, 100 + Math.random() * 200);
  }
}
function rmc() { return MATRIX_CHARS[Math.floor(Math.random()*MATRIX_CHARS.length)]; }

// ── 背景装饰 ──
function buildScenery() {
  buildMatrixRain();
  // 光柱
  for (let i = 0; i < 6; i++) {
    const r = document.createElement('div');
    r.className = 'light-ray';
    r.style.left = (8 + i*16) + '%';
    r.style.width = (2 + Math.random()*4) + 'px';
    r.style.animationDuration = (7 + Math.random()*9) + 's';
    r.style.animationDelay = (-Math.random()*9) + 's';
    document.body.appendChild(r);
  }
  // 天线
  const ac = Math.floor(window.innerWidth / 75);
  for (let i = 0; i < ac; i++) {
    const a = document.createElement('div');
    a.className = 'antenna';
    a.style.left = (0.5 + (i/ac)*99 + (Math.random()-0.5)*2) + '%';
    a.style.height = (18 + Math.random()*38) + 'px';
    a.style.setProperty('--lean', Math.random()>0.5?'1':'-1');
    a.style.setProperty('--bd', (1.2+Math.random()*2.5)+'s');
    a.style.animationDuration = (2+Math.random()*3)+'s';
    a.style.animationDelay = (-Math.random()*3)+'s';
    a.style.opacity = (0.4+Math.random()*0.5).toString();
    document.body.appendChild(a);
  }
  // 电子工具emoji — 左下角固定💻，其余随机
  const elEmojis = ['📡','🔌','⚡','💾','🖨️','🔋','📟','🖱️','⌨️','📺'];
  const dc = Math.floor(window.innerWidth/220) + 2;
  for (let i = 0; i < dc; i++) {
    const d = document.createElement('div');
    d.className = 'server-deco';
    if (i === 0) {
      d.textContent = '💻';
      d.style.left = '18px';
      d.style.fontSize = '2.8rem';
      d.style.opacity = '0.85';
    } else {
      d.textContent = elEmojis[Math.floor(Math.random()*elEmojis.length)];
      d.style.left = (8 + (i/dc)*84 + (Math.random()-0.5)*5) + '%';
      d.style.fontSize = (1.8 + Math.random()*1.6) + 'rem';
      d.style.opacity = (0.45 + Math.random()*0.38).toString();
    }
    document.body.appendChild(d);
  }
  // 小节点
  const ns = ['⬡','◆','●','▪','△'];
  for (let i=0;i<12;i++){
    const d=document.createElement('div');
    d.style.cssText=`position:fixed;bottom:${66+Math.random()*8}px;left:${Math.random()*96}%;font-size:${0.45+Math.random()*0.4}rem;color:rgba(0,200,150,${0.18+Math.random()*0.3});pointer-events:none;z-index:5;font-family:'Source Code Pro','Courier New',monospace;`;
    d.textContent=ns[Math.floor(Math.random()*ns.length)];
    document.body.appendChild(d);
  }
}

// ── LLM Fish ──
class LLMFish {
  constructor(def, x, y) {
    this.def = def;
    this.x = x ?? Math.random()*(window.innerWidth-100)+50;
    this.y = y ?? Math.random()*(window.innerHeight*0.65)+60;
    this.vx = (Math.random()-0.5)*2.5;
    this.vy = (Math.random()-0.5)*1.2;
    this.size = def.size||52;
    this.state = 'swim'; this.stateTimer=0;
    this.actionTimer = Math.random()*200;
    this.facing = 1; this.wobble=0;
    this.wobbleSpeed = 0.03+Math.random()*0.03;
    this.targetX=null; this.targetY=null;
    this.spinAngle=0; this.happiness=0;
    this.currentScale=1;       // Claude：当前缩放
    this.targetScale=1;        // Claude：目标缩放
    this.bounceCount=0;        // Claude：已弹次数
    this.bounceMax=0;          // Claude：本轮弹跳上限
    this.bounceDir=1;          // Claude：弹跳方向
    this.freezeTimer=0;        // Gemini：停滞计时（帧）
    this.frozenRot=0;          // Gemini：停滞时冻结的旋转角
    this.bobPhase=0;           // Copilot：弹跳相位
    this.bobActive=false;      // Copilot：是否弹跳中
    this.bobCount=0;           // Copilot：弹跳次数
    this.huggingBottom=false;  // DeepSeek：贴底游动
    this.huggingTimer=0;       // DeepSeek：贴底剩余帧
    this.specialTimer=2400;    // 通用特殊行为冷却（初始等满一轮再判定）

    this.el = document.createElement('div');
    this.el.className='fish';
    this.el.style.width=this.size+'px';
    this.el.style.height=this.size+'px';
    const img=document.createElement('img');
    img.src=def.img; img.draggable=false;
    this.el.appendChild(img); this.imgEl=img;
    this.bubbleEl=document.createElement('div');
    this.bubbleEl.className='speech-bubble';
    document.body.appendChild(this.bubbleEl);  // 挂到body，不受鱼旋转影响
    this.el.title=def.name;
    this.el.addEventListener('click',e=>this.onClick(e));
    if(def.personality==='cat') this.el.style.zIndex='12';
    document.body.appendChild(this.el);
  }

  onClick(e) {
    spawnHeart(e.clientX,e.clientY);
    rippleAt(e.clientX,e.clientY);
    this.setState('spin',60);
    this.happiness=1;
    if(this.def.personality==='cat'&&Math.random()<0.5){
      const phrases=['我注意到了','你不能一直这样'];
      this.bubbleEl.textContent=phrases[Math.floor(Math.random()*2)];
      this.bubbleEl.classList.add('visible');
      clearTimeout(this._bt);
      this._bt=setTimeout(()=>this.bubbleEl.classList.remove('visible'),2400);
    }
  }

  showPhrase() {
    const p=this.def.phrases[Math.floor(Math.random()*this.def.phrases.length)];
    this.bubbleEl.textContent=p;
    this.bubbleEl.classList.add('visible');
    clearTimeout(this._bt);
    this._bt=setTimeout(()=>this.bubbleEl.classList.remove('visible'),2400);
  }

  onEatToken() {
    this.happiness=1;
    setTimeout(()=>spawnHeart(this.x+this.size/2,this.y),300+Math.random()*500);
    this.showPhrase();
  }

  setState(s,dur){this.state=s;this.stateTimer=dur||120;}

  // ── 通用巡游目标（各personality偏向不同区域）──
  pickCruiseTarget(){
    const p=this.def.personality;
    let tx=80+Math.random()*(window.innerWidth-160);
    let ty=60+Math.random()*(window.innerHeight*0.65);
    if(p==='deep'||p==='hugging'){
      ty=window.innerHeight*0.48+Math.random()*(window.innerHeight*0.22);
    } else if(p==='office'){
      tx=window.innerWidth*0.5+Math.random()*(window.innerWidth*0.42);
    } else if(p==='steady'){
      tx=window.innerWidth*0.25+Math.random()*(window.innerWidth*0.5);
      ty=window.innerHeight*0.2+Math.random()*(window.innerHeight*0.4);
    }
    return {tx,ty};
  }

  update() {
    this.wobble+=this.wobbleSpeed;
    this.actionTimer--;
    if(this.stateTimer>0)this.stateTimer--;
    if(this.happiness>0)this.happiness-=0.005;
    if(this.specialTimer>0)this.specialTimer--;

    const p=this.def.personality;

    // ══════════════════════════════════════
    // Gemini 停滞逻辑
    // ══════════════════════════════════════
    if(p==='erratic'){
      if(this.freezeTimer>0){
        this.freezeTimer--;
        // 动力归零，只受重力下落
        this.vx=0;
        this.vy+=0.06;
        this.x+=this.vx; this.y+=this.vy;
        // 碰到底部边界停住
        if(this.y>window.innerHeight-100){this.y=window.innerHeight-100;this.vy=0;}
        // 用冻结帧的rot直接写transform，跳过render里的wobble/tilt计算
        this.el.style.width=this.size+'px'; this.el.style.height=this.size+'px';
        this.el.style.transform=`translate(${this.x}px,${this.y}px) rotate(${this.frozenRot}deg)`;
        this.imgEl.style.filter='';
        return;
      }
      // 随机触发停滞（约每400帧一次）
      if(this.specialTimer===0&&Math.random()<0.0025){
        // 记录触发瞬间的旋转角度
        const wr=Math.sin(this.wobble*0.7)*3;
        this.frozenRot=this.facing===-1?wr-4:wr+4;
        this.vy=0; this.vx=0;
        this.freezeTimer=Math.floor(60+Math.random()*120);
        this.specialTimer=400+Math.random()*200;
      }
    }

    // ══════════════════════════════════════
    // Claude 放大漂浮 & 顶部弹跳
    // ══════════════════════════════════════
    if(p==='cat'){
      // 缩放插值
      if(Math.abs(this.currentScale-this.targetScale)>0.002){
        this.currentScale+=(this.targetScale-this.currentScale)*0.015;
      } else {
        this.currentScale=this.targetScale;
      }

      // 顶部弹跳逻辑
      if(this.state==='bounce'){
        this.vx*=0.92;
        const bounceSpeed=5;
        if(this.bounceDir===1){ // 向上
          this.y-=bounceSpeed;
          if(this.y<=10){
            this.bounceCount++;
            if(this.bounceCount>=this.bounceMax){
              // 弹跳结束
              if(this.bounceMax>=10){
                // 逃逸！切换残留帧图片，短暂停留后消失
                const idx=fishList.indexOf(this);
                if(idx>=-1){fishList.splice(idx,1);}
                this.imgEl.src='claude_1.png';
                const ex=this.x, ey=this.y;
                setTimeout(()=>{
                  this.remove();
                  // 在原地生成孤立气泡
                  const eb=document.createElement('div');
                  eb.textContent=Math.random()<0.5?'自由~':'自由了！';
                  eb.style.cssText=`
                    position:fixed;
                    left:${ex}px; top:${ey}px;
                    transform:translateX(-50%);
                    background:rgba(2,12,28,0.92);
                    border:1px solid rgba(0,220,160,0.45); border-radius:8px;
                    padding:4px 10px; font-size:0.65rem;
                    color:rgba(100,255,200,0.95); white-space:nowrap;
                    pointer-events:none; z-index:20;
                    font-family:'Source Code Pro','Courier New',monospace; letter-spacing:0.03em;
                    box-shadow:0 0 16px rgba(0,200,140,0.15);
                    opacity:1; transition:opacity 0.25s;
                  `;
                  document.body.appendChild(eb);
                  setTimeout(()=>{eb.style.opacity='0'; setTimeout(()=>eb.remove(),300);},2400);
                },30);
                return;
              }
              this.state='swim'; this.y=40;
              this.specialTimer=2400;
            } else {
              this.bounceDir=-1;
            }
          }
        } else { // 向下回落
          this.y+=bounceSpeed*1.2;
          if(this.y>=60){ this.bounceDir=1; }
        }
        this.render(); return;
      }

      // 每2400帧判定一次special move：60%放大漂浮，30%顶部弹跳，10%无事发生
      if(this.specialTimer===0&&this.state!=='bounce'){
        this.specialTimer=2400;
        const roll=Math.random();
        if(roll<0.6){
          // 放大漂浮
          this.targetScale=1.5;
          setTimeout(()=>{
            this.targetScale=1.0;
          }, (60+Math.random()*90)*(1000/60));
        } else if(roll<0.9){
          // 顶部弹跳
          this.state='bounce';
          this.bounceDir=1;
          this.bounceCount=0;
          this.bounceMax=1+Math.floor(Math.random()*15);
          this.vx*=0.3; this.vy=0;
          this.state='bounce';
          this.bounceDir=1;
          this.bounceCount=0;
          this.bounceMax=1+Math.floor(Math.random()*15);
          this.vx*=0.3; this.vy=0;
        }
        // else: 10%无事发生，specialTimer已重置，等下一轮
      }
    }

    // ══════════════════════════════════════
    // DeepSeek 贴底逻辑
    // ══════════════════════════════════════
    if(p==='deep'){
      if(this.huggingBottom){
        this.huggingTimer--;
        // 贴底游动：y固定在底部，x随机游动
        this.y+=(window.innerHeight-120-this.y)*0.08;
        this.vx+=(Math.random()-0.5)*0.4;
        this.vx*=0.95;
        this.x+=this.vx; this.y+=this.vy*0.1;
        if(this.vx>0.12)this.facing=1; else if(this.vx<-0.12)this.facing=-1;
        this.x=Math.max(20,Math.min(window.innerWidth-20,this.x));
        if(this.huggingTimer<=0){
          this.huggingBottom=false;
          this.specialTimer=400+Math.random()*300;
        }
        this.render(); return;
      }
      // 随机触发冲底（约每450帧）
      if(this.specialTimer===0&&Math.random()<0.002){
        // 先快速冲向底部
        this.vy=8; this.vx=(Math.random()-0.5)*3;
        this.specialTimer=100;
        setTimeout(()=>{
          if(!this.huggingBottom){
            this.huggingBottom=true;
            this.huggingTimer=120+Math.floor(Math.random()*180);
          }
        },600);
      }
    }

    // ══════════════════════════════════════
    // Copilot 上下弹跳
    // ══════════════════════════════════════
    if(p==='office'){
      if(this.bobActive){
        this.bobPhase+=0.28;
        const bobAmp=14;
        this.y=this.bobBaseY+Math.sin(this.bobPhase)*bobAmp;
        this.vx*=0.9;
        // 完成两次完整周期
        if(this.bobPhase>=Math.PI*2*2){
          this.bobActive=false;
          this.bobPhase=0;
          this.specialTimer=350+Math.random()*300;
          this.y=this.bobBaseY;
        }
        if(this.vx>0.12)this.facing=1; else if(this.vx<-0.12)this.facing=-1;
        this.render(); return;
      }
      // 随机触发弹跳（约每400帧）
      if(this.specialTimer===0&&Math.random()<0.0025){
        this.bobActive=true;
        this.bobPhase=0;
        this.bobBaseY=this.y;
        this.specialTimer=400;
      }
    }

    // ══════════════════════════════════════
    // 通用行为决策（GPT/Qwen/Grok/Claude普通状态）
    // ══════════════════════════════════════
    if(this.actionTimer<=0&&this.state!=='spin'&&this.state!=='bounce'){
      this.actionTimer=120+Math.random()*250;

      // 各personality行为分布
      // [idle, cruise, —, dash, cruise2] 实际只用前几个
      let roll=Math.random();

      if(p==='worker'||p==='steady'){
        // GPT/Qwen：绝大多数时间巡游，偶尔原地浮动
        if(roll<0.12){
          this.setState('idle',80+Math.random()*100);
        } else {
          const {tx,ty}=this.pickCruiseTarget();
          this.targetX=tx; this.targetY=ty;
          this.setState('cruise',200+Math.random()*200);
        }
      } else if(p==='rebel'){
        // Grok：以GPT为基础，偶尔快速冲向左右边框
        if(roll<0.12){
          this.setState('idle',60+Math.random()*80);
        } else if(roll<0.25){
          // 快速冲边框
          this.targetX=Math.random()<0.5?20:window.innerWidth-20;
          this.targetY=60+Math.random()*(window.innerHeight*0.6);
          this.vx=(this.targetX<this.x?-1:1)*9;
          this.setState('cruise',60);
        } else {
          const {tx,ty}=this.pickCruiseTarget();
          this.targetX=tx; this.targetY=ty;
          this.setState('cruise',200+Math.random()*200);
        }
      } else if(p==='erratic'){
        // Gemini：以GPT为基础
        if(roll<0.12){
          this.setState('idle',60+Math.random()*80);
        } else {
          const {tx,ty}=this.pickCruiseTarget();
          this.targetX=tx; this.targetY=ty;
          this.setState('cruise',180+Math.random()*200);
        }
      } else if(p==='deep'){
        // DeepSeek：以GPT为基础
        if(roll<0.12){
          this.setState('idle',60+Math.random()*80);
        } else {
          const {tx,ty}=this.pickCruiseTarget();
          this.targetX=tx; this.targetY=ty;
          this.setState('cruise',200+Math.random()*200);
        }
      } else if(p==='office'){
        // Copilot：以GPT为基础
        if(roll<0.12){
          this.setState('idle',80+Math.random()*100);
        } else {
          const {tx,ty}=this.pickCruiseTarget();
          this.targetX=tx; this.targetY=ty;
          this.setState('cruise',200+Math.random()*200);
        }
      } else if(p==='cat'){
        // Claude：以GPT为基础 + 放大/弹跳由specialTimer控制
        if(roll<0.15){
          this.setState('idle',80+Math.random()*120);
        } else {
          const {tx,ty}=this.pickCruiseTarget();
          this.targetX=tx; this.targetY=ty;
          this.setState('cruise',200+Math.random()*200);
        }
      } else {
        if(roll<0.15){this.setState('idle',80+Math.random()*120);}
        else{
          const {tx,ty}=this.pickCruiseTarget();
          this.targetX=tx;this.targetY=ty;
          this.setState('cruise',200+Math.random()*200);
        }
      }
    }

    // 鼠标吸引（仅Claude稍强）
    const dx=mouseX-this.x,dy=mouseY-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const att=p==='cat'?0.07:0.04;
    if(dist<180&&dist>1&&this.state!=='sleep'){this.vx+=(dx/dist)*att;this.vy+=(dy/dist)*att;}

    // 斥力
    for(const o of fishList){
      if(o===this)continue;
      const ox=this.x-o.x,oy=this.y-o.y;
      const od=Math.sqrt(ox*ox+oy*oy);
      const md=(this.size+o.size)*0.6;
      if(od<md&&od>0.5){const pf=(md-od)/md*0.35;this.vx+=(ox/od)*pf;this.vy+=(oy/od)*pf;}
    }

    // 状态物理
    switch(this.state){
      case 'idle':
        this.vx*=0.88; this.vy*=0.88; break;
      case 'sleep':
        this.vx*=0.90; this.vy*=0.90; this.vy+=0.04; break;
      case 'spin':
        this.spinAngle+=12; this.vx*=0.9; this.vy*=0.9;
        if(this.stateTimer<=0){this.state='swim';this.spinAngle=0;} break;
      case 'swim':
        this.vx+=(Math.random()-0.5)*0.15; this.vy+=(Math.random()-0.5)*0.08; break;
      case 'cruise':
        if(this.targetX!==null){
          const tdx=this.targetX-this.x,tdy=this.targetY-this.y;
          const td=Math.sqrt(tdx*tdx+tdy*tdy);
          // Grok冲边时不用cruise加速，依靠初速度
          const spd=(p==='rebel'&&this.stateTimer>40)?0.35:0.22;
          if(td>20){this.vx+=(tdx/td)*spd;this.vy+=(tdy/td)*(spd*0.65);}
          else{this.setState('swim',40);this.targetX=null;this.targetY=null;}
        } break;
    }

    // 速度上限
    const ms={cat:3.0,worker:2.6,erratic:3.0,rebel:9.0,deep:8.0,office:2.4,steady:2.6};
    const mx=this.state==='spin'?2:(ms[p]||3.0);
    const sp=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(sp>mx){this.vx=(this.vx/sp)*mx;this.vy=(this.vy/sp)*mx;}
    this.vx*=0.97; this.vy*=0.97;
    this.x+=this.vx; this.y+=this.vy;

    // 边界（bounce状态由自身逻辑管理y，这里只管x）
    if(this.state!=='bounce'){
      if(this.x<60)this.vx+=0.4;
      if(this.x>window.innerWidth-60)this.vx-=0.4;
      if(this.y<50)this.vy+=0.3;
      if(this.y>window.innerHeight-100)this.vy-=0.5;
      this.x=Math.max(20,Math.min(window.innerWidth-20,this.x));
      this.y=Math.max(30,Math.min(window.innerHeight-80,this.y));
    } else {
      if(this.x<20)this.x=20;
      if(this.x>window.innerWidth-20)this.x=window.innerWidth-20;
    }
    if(this.vx>0.12)this.facing=1; else if(this.vx<-0.12)this.facing=-1;
    this.render();
  }

  render(){
    const wy=Math.sin(this.wobble)*2.5;
    const wr=Math.sin(this.wobble*0.7)*3;
    const tilt=this.facing===-1?wr-4:wr+4;
    const rot=this.state==='spin'?this.spinAngle:this.state==='sleep'?wr:tilt;

    // Claude缩放：通过el的width/height实现，保持transform干净
    const sc=this.def.personality==='cat'?this.currentScale:1;
    const displaySize=this.size*sc;
    this.el.style.width=displaySize+'px';
    this.el.style.height=displaySize+'px';
    // 缩放时让图标以中心为基准
    const offsetX=-(displaySize-this.size)/2;
    const offsetY=-(displaySize-this.size)/2;
    this.el.style.transform=`translate(${this.x+offsetX}px,${this.y+wy+offsetY}px) rotate(${rot}deg)`;

    this.imgEl.style.filter=this.happiness>0?`drop-shadow(0 0 ${8+this.happiness*18}px rgba(0,255,180,${this.happiness*0.85}))`:'';
    // 气泡用fixed坐标跟随鱼的实际位置，始终水平显示在正上方
    this.bubbleEl.style.left=`${this.x + this.size/2}px`;
    this.bubbleEl.style.top=`${this.y + wy - 28}px`;
    if(this.state==='sleep'){
      if(!this.el._zzz){
        const z=document.createElement('div');
        z.textContent='💤';
        z.style.cssText='position:fixed;font-size:0.85rem;pointer-events:none;z-index:15;animation:zzz-float 2s ease-in-out infinite;';
        document.body.appendChild(z);this.el._zzz=z;
      }
      this.el._zzz.style.left=(this.x+this.size*0.5+4)+'px';
      this.el._zzz.style.top=(this.y-18)+'px';
    } else {
      if(this.el._zzz){this.el._zzz.remove();this.el._zzz=null;}
    }
  }
  remove(){if(this.el._zzz)this.el._zzz.remove();this.bubbleEl.remove();this.el.remove();}
}

// ── 特效 ──
function spawnHeart(x,y){
  const h=document.createElement('div');h.className='heart-pop';
  h.textContent=['❤️','💕','✨','💖','⚡'][Math.floor(Math.random()*5)];
  h.style.left=x+'px';h.style.top=y+'px';
  document.body.appendChild(h);setTimeout(()=>h.remove(),1300);
}
function rippleAt(x,y){
  const r=document.createElement('div');r.className='ripple';
  r.style.left=x+'px';r.style.top=y+'px';
  document.body.appendChild(r);setTimeout(()=>r.remove(),3100);
}
function spawnToken(x,y){
  const t=document.createElement('div');t.className='token-food';
  t.textContent=TOKENS[Math.floor(Math.random()*TOKENS.length)];
  t.style.left=x+'px';t.style.top=y+'px';
  const r0=(Math.random()*30-15).toFixed(1);
  const r1=(Math.random()*30-15).toFixed(1);
  t.style.setProperty('--r0',r0+'deg');
  t.style.setProperty('--r1',r1+'deg');
  document.body.appendChild(t);setTimeout(()=>t.remove(),3200);
  fishList.forEach(fish=>{
    const dx=x-fish.x,dy=y-fish.y;
    if(Math.sqrt(dx*dx+dy*dy)<320){
      fish.vx+=dx*0.012;fish.vy+=dy*0.012;fish.onEatToken();
    }
  });
}

// ── 控制 ──
function addLLM(){
  const def=LLM_LIST[Math.floor(Math.random()*LLM_LIST.length)];
  const f=new LLMFish(def,mouseX+(Math.random()-0.5)*120,mouseY+(Math.random()-0.5)*80);
  f.vx=(Math.random()-0.5)*3;f.vy=(Math.random()-0.5)*2;
  fishList.push(f);rippleAt(mouseX,mouseY);
  updateHUD();
}
function feedAll(){
  for(let i=0;i<6;i++) setTimeout(()=>spawnToken(120+Math.random()*(window.innerWidth-240),60+Math.random()*(window.innerHeight*0.5)),i*200);
}
function toggleFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
function toggleUI(){
  const h=document.body.classList.toggle('ui-hidden');
  document.getElementById('toggle-ui').textContent=h?'+':'▬';
}
function updateHUD(){
  const el=document.getElementById('hud-count');
  if(el)el.textContent=fishList.length;
}

// ── 事件 ──
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
document.addEventListener('click',e=>{
  if(e.target.closest('.fish')||e.target.closest('#controls')||e.target.id==='toggle-ui')return;
  rippleAt(e.clientX,e.clientY);spawnToken(e.clientX,e.clientY);
});
document.addEventListener('contextmenu',e=>{e.preventDefault();addLLM();});
const _heldKeys=new Set();
document.addEventListener('keydown',e=>{
  _heldKeys.add(e.key);
  if(e.key==='f'||e.key==='F')feedAll();
  if(e.key==='a'||e.key==='A')addLLM();
  // 1+3同时按住：触发最早召唤的Claude逃逸（测试用，不写入引导）
  if(_heldKeys.has('1')&&_heldKeys.has('4')){
    const gemini=fishList.find(f=>f.def.personality==='erratic');
    if(gemini&&gemini.freezeTimer<=0){
      const wr=Math.sin(gemini.wobble*0.7)*3;
      gemini.frozenRot=gemini.facing===-1?wr-4:wr+4;
      gemini.vy=0; gemini.vx=0;
      gemini.freezeTimer=180;
      gemini.specialTimer=600;
    }
  }
  if(_heldKeys.has('1')&&_heldKeys.has('3')){
    const claude=fishList.find(f=>f.def.personality==='cat');
    if(claude&&claude.state!=='bounce'){
      claude.state='bounce';
      claude.bounceDir=1;
      claude.bounceCount=0;
      claude.bounceMax=12;
      claude.vx*=0.3; claude.vy=0;
    }
  }
});
document.addEventListener('keyup',e=>{_heldKeys.delete(e.key);});

// ── 主循环 ──
function init(){
  buildScenery();
  LLM_LIST.forEach((def,i)=>{
    const x=(window.innerWidth/(LLM_LIST.length+1))*(i+1);
    const y=100+Math.random()*(window.innerHeight*0.5);
    const f=new LLMFish(def,x,y);
    f.vx=(Math.random()-0.5)*2;f.vy=(Math.random()-0.5)*1;
    fishList.push(f);
  });
  updateHUD();
  function loop(){fishList.forEach(f=>f.update());requestAnimationFrame(loop);}
  loop();
  setTimeout(()=>{
    const h=document.getElementById('fullscreen-hint');
    if(h){h.style.opacity='0';setTimeout(()=>h.remove(),500);}
  },4000);
}
init();
</script>
